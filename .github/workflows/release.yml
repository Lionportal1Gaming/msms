name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-beta.*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == *"-beta."* ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: node scripts/validate-release.mjs --channel "${{ steps.release_meta.outputs.channel }}" --tag "${{ github.ref_name }}" --require-secrets
        env:
          MSMS_UPDATER_PUBLIC_KEY: ${{ vars.MSMS_UPDATER_PUBLIC_KEY }}
          MSMS_UPDATER_STABLE_ENDPOINT: ${{ vars.MSMS_UPDATER_STABLE_ENDPOINT }}
          MSMS_UPDATER_BETA_ENDPOINT: ${{ vars.MSMS_UPDATER_BETA_ENDPOINT }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - run: node scripts/prepare-tauri-config.mjs --channel "${{ steps.release_meta.outputs.channel }}" --write
        env:
          MSMS_UPDATER_PUBLIC_KEY: ${{ vars.MSMS_UPDATER_PUBLIC_KEY }}
          MSMS_UPDATER_STABLE_ENDPOINT: ${{ vars.MSMS_UPDATER_STABLE_ENDPOINT }}
          MSMS_UPDATER_BETA_ENDPOINT: ${{ vars.MSMS_UPDATER_BETA_ENDPOINT }}
      - id: release_notes
        run: node scripts/extract-release-notes.mjs "${GITHUB_REF_NAME#v}"
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MSMS ${{ github.ref_name }} (${{ steps.release_meta.outputs.channel }})"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          prerelease: ${{ steps.release_meta.outputs.channel == 'beta' }}
          includeUpdaterJson: true
          updaterJsonKeepUniversal: true

  publish_updater_feed:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == *"-beta."* ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: mkdir -p .release-feed
      - run: gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --pattern "latest.json" --dir .release-feed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: node scripts/publish-github-pages-feed.mjs --channel "${{ steps.release_meta.outputs.channel }}" --asset-path .release-feed/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
